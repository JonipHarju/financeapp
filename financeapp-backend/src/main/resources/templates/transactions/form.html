<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Transaction</title>
</head>
<body>
    <h1 th:text="${transactionId} ? 'Edit Transaction' : 'New Transaction'"></h1>

    <nav>
        <a th:href="@{/dashboard}">Transactions</a> |
        <a th:href="@{/categories}">Categories</a> |
        <form th:action="@{/auth/logout}" method="post" style="display:inline">
            <button type="submit">Logout</button>
        </form>
    </nav>

    <form th:action="${transactionId} ? @{/transactions/{id}/edit(id=${transactionId})} : @{/transactions/new}"
          th:object="${transactionRequest}" method="post">

        <label>Amount:
            <input type="number" step="0.01" th:field="*{amount}" />
        </label>
        <span th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></span><br/>

        <label>Date:
            <input type="date" th:name="date" th:value="${#temporals.format(transactionRequest.date, 'yyyy-MM-dd')}" />
        </label>
        <span th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></span><br/>

        <label>Description:
            <input type="text" th:field="*{description}" />
        </label><br/>

        <label>Type:
            <select th:field="*{type}">
                <option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option>
            </select>
        </label>
        <span th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></span><br/>

        <label>Category:
            <select th:field="*{categoryId}">
                <option value="">-- None --</option>
                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
            </select>
        </label><br/>

        <button type="submit">Save</button>
        <a th:href="@{/dashboard}">Cancel</a>
    </form>
</body>
</html>
