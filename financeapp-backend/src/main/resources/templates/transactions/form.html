<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Transaction</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col">

    <nav class="border-b border-gray-800 px-6 py-3 flex items-center justify-between">
        <span class="text-lg font-semibold tracking-tight text-white">Finance<span class="text-emerald-400">App</span></span>
        <div class="flex items-center gap-1">
            <a th:href="@{/dashboard}" class="px-3 py-1.5 text-sm text-gray-400 hover:text-white hover:bg-gray-800 rounded-md transition-colors">Transactions</a>
            <a th:href="@{/categories}" class="px-3 py-1.5 text-sm text-gray-400 hover:text-white hover:bg-gray-800 rounded-md transition-colors">Categories</a>
            <form th:action="@{/auth/logout}" method="post" style="display:inline" class="ml-2">
                <button type="submit" class="px-3 py-1.5 text-sm text-gray-400 hover:text-white hover:bg-gray-800 rounded-md transition-colors cursor-pointer">Logout</button>
            </form>
        </div>
    </nav>

    <main class="flex-1 flex items-start justify-center px-6 py-12">
        <div class="w-full max-w-md">
            <h1 th:text="${transactionId} ? 'Edit Transaction' : 'New Transaction'"
                class="text-2xl font-bold text-white tracking-tight mb-6"></h1>

            <div class="bg-gray-900 border border-gray-800 rounded-xl p-8 shadow-xl">
                <form th:action="${transactionId} ? @{/transactions/{id}/edit(id=${transactionId})} : @{/transactions/new}"
                      th:object="${transactionRequest}" method="post" class="space-y-5">

                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1.5">Amount</label>
                        <input type="number" step="0.01" th:field="*{amount}"
                               class="w-full bg-gray-800 border border-gray-700 text-gray-100 rounded-lg px-3 py-2.5 text-sm placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all"
                               placeholder="0.00" />
                        <span th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"
                              class="block mt-1.5 text-xs text-red-400"></span>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1.5">Date</label>
                        <input type="date" th:name="date" th:value="${#temporals.format(transactionRequest.date, 'yyyy-MM-dd')}"
                               class="w-full bg-gray-800 border border-gray-700 text-gray-100 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all" />
                        <span th:if="${#fields.hasErrors('date')}" th:errors="*{date}"
                              class="block mt-1.5 text-xs text-red-400"></span>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1.5">Description</label>
                        <input type="text" th:field="*{description}"
                               class="w-full bg-gray-800 border border-gray-700 text-gray-100 rounded-lg px-3 py-2.5 text-sm placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all"
                               placeholder="e.g. Grocery run" />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1.5">Type</label>
                        <select th:field="*{type}"
                                class="w-full bg-gray-800 border border-gray-700 text-gray-100 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all">
                            <option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option>
                        </select>
                        <span th:if="${#fields.hasErrors('type')}" th:errors="*{type}"
                              class="block mt-1.5 text-xs text-red-400"></span>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1.5">Category</label>
                        <select th:field="*{categoryId}"
                                class="w-full bg-gray-800 border border-gray-700 text-gray-100 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all">
                            <option value="">-- None --</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                        </select>
                    </div>

                    <div class="flex gap-3 pt-2">
                        <button type="submit"
                                class="flex-1 bg-emerald-500 hover:bg-emerald-400 text-white rounded-lg py-2.5 text-sm font-medium transition-colors shadow-lg shadow-emerald-500/20">
                            Save
                        </button>
                        <a th:href="@{/dashboard}"
                           class="flex-1 text-center bg-gray-800 hover:bg-gray-700 text-gray-300 rounded-lg py-2.5 text-sm font-medium transition-colors border border-gray-700">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>

</body>
</html>
