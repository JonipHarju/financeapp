<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Finance App</title>
</head>
<body>
    <h1>Transactions</h1>

    <nav>
        <a th:href="@{/dashboard}">Transactions</a> |
        <a th:href="@{/categories}">Categories</a> |
        <form th:action="@{/auth/logout}" method="post" style="display:inline">
            <button type="submit">Logout</button>
        </form>
    </nav>

    <a th:href="@{/transactions/new}">+ New Transaction</a>

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Description</th>
                <th>Category</th>
                <th>Type</th>
                <th>Amount</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${#lists.isEmpty(transactions)}">
                <td colspan="6">No transactions yet.</td>
            </tr>
            <tr th:each="tx : ${transactions}">
                <td th:text="${tx.date}"></td>
                <td th:text="${tx.description}"></td>
                <td th:text="${tx.categoryName} ?: '-'"></td>
                <td th:text="${tx.type}"></td>
                <td th:text="${tx.amount}"></td>
                <td>
                    <a th:href="@{/transactions/{id}/edit(id=${tx.id})}">Edit</a>
                    <form th:action="@{/transactions/{id}/delete(id=${tx.id})}" method="post" style="display:inline">
                        <button type="submit">Delete</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
